            background-size: 200% 100%;
            animation: shimmer 2s infinite;

            0% { background-position: -200% 0; }
            100% { background-position: 200% 0; }
        }
        .auth-pulse {
            animation: pulse-ring 1.5s cubic-bezier(0.4, 0, 0.6, 1) infinite;
        }
        @keyframes pulse-ring {
            0% { transform: scale(0.95); opacity: 0.5; }
            50% { transform: scale(1.05); opacity: 0.2; }

<body class="bg-surface text-on-surface min-h-screen font-body-md flex flex-auto flex-col overflow-x-hidden">
<!-- Top App Bar -->
<header class="w-full top-0 sticky flex justify-between items-center px-container-padding h-16 w-full bg-surface/80 dark:bg-on-background/80 backdrop-blur-md z-40">
<div class="flex items-center gap-stack-gap-md">
<button class="p-2 hover:bg-surface-container-low rounded-full transition-colors active:scale-95 duration-150" onclick="window.history.back()">
<span class="material-symbols-outlined text-primary">arrow_back</span>
</button>
<h1 class="font-headline-sm text-headline-sm text-on-surface">비밀 보관함</h1>
</div>
<div class="flex items-center gap-stack-gap-sm">
<button class="p-2 hover:bg-surface-container-low rounded-full transition-colors active:scale-95 duration-150">
<span class="material-symbols-outlined text-on-surface-variant">share</span>
</button>
<button class="p-2 hover:bg-surface-container-low rounded-full transition-colors active:scale-95 duration-150">
<span class="material-symbols-outlined text-error">delete</span>
</button>
</div>
</header>
<main class="flex-grow px-container-padding pb-24">
<!-- Secure Asset Area -->
<div class="relative w-full aspect-[4/3] mt-stack-gap-md mb-stack-gap-lg overflow-hidden rounded-xl bg-on-background shadow-lg group">
<!-- The Secret Image -->
<div class="absolute inset-0 w-full h-full blur-[40px] opacity-40 transition-all duration-700 ease-in-out scale-110" id="secret-image-container">
<div class="w-full h-full bg-cover bg-center" data-alt="사원증 상세 이미지" style="background-image: url('https://lh3.googleusercontent.com/aida-public/AB6AXuDLbHIB-_dPwyHYTdLkJunQJ5_ydVqyOf3kEWo8Dt3XshJsCyFG_-C3h_aFxqGOxd7z5UmlYnTNNs1GJAAHRJxYpMLa9L15pyYjt7fbU8l-weUZMted4mfkdE_7hSHRLlA807WyjroHn5fQoDR0iK9mezI8OTe9A-Zjnly8GgM3V_18k7WdgFH8gYnFWhUGt02Z3DiFY1sF-bLtgUTYJnXrmEbELRgftFoJkHULEJU_3oNwFOVc1ZTonJjbrnJeaECgAF35c89h3iU')"></div>
</div>
<!-- Reveal Overlay -->
<div class="absolute inset-0 z-10 flex flex-col items-center justify-center bg-on-background/60 backdrop-blur-md transition-opacity duration-500" id="reveal-overlay">
<div class="relative mb-stack-gap-md">
<div class="auth-pulse absolute inset-0 bg-primary/20 rounded-full scale-150"></div>
<button class="relative z-20 w-20 h-20 bg-primary text-on-primary rounded-full flex items-center justify-center shadow-xl active:scale-90 transition-transform duration-200" onclick="simulateAuth()">
<span class="material-symbols-outlined !text-[40px]">fingerprint</span>
</button>
</div>
<p class="font-headline-sm text-headline-sm text-on-primary text-center">탭하여 열기</p>
<p class="font-caption text-caption text-on-primary-container mt-2 opacity-80">생체인증 필요</p>
</div>
<!-- Lock Indicator (Visible when revealed) -->
<div class="absolute top-4 right-4 z-20 px-3 py-1 bg-emerald-500/90 text-white rounded-full flex items-center gap-1.5 opacity-0 transition-opacity duration-300" id="unlocked-badge">
<span class="material-symbols-outlined !text-[16px]">lock_open</span>
<span class="text-[12px] font-bold">잠금 해제됨</span>
</div>
</div>
<!-- Content Details -->
<div class="space-y-stack-gap-lg">
<section>
<div class="flex items-center gap-2 mb-1">
<span class="px-2 py-0.5 bg-tertiary-fixed text-on-tertiary-fixed font-label-caps text-label-caps rounded-sm">비밀</span>

</div>
<h2 class="font-headline-lg-mobile text-headline-lg-mobile text-text-main">사원증</h2>

<!-- AI Summary Card -->
<div class="p-stack-gap-md bg-surface-container-highest/50 rounded-xl border border-surface-border">
<div class="flex items-center gap-2 mb-stack-gap-sm">
<span class="material-symbols-outlined text-primary" style="font-variation-settings: 'FILL' 1;">auto_awesome</span>
<span class="font-headline-sm text-[16px] text-primary">AI 분석</span>

<p class="font-body-md text-on-surface-variant leading-relaxed">
                    이 문서는 기업용 신분증으로 보입니다. Sortmate가 사번(8832-X)과 만료일(2026년 12월)을 추출했습니다. 민감한 개인 정보가 포함되어 현재 비밀 보관함으로 분류되어 있습니다.
                </p>

</div>
<div class="p-3 bg-surface-container-low rounded-lg">

<span class="material-symbols-outlined">edit</span>

</button>

<span class="material-symbols-outlined">history</span>
<span class="text-[10px]">로그</span>
</button>
</div>

<script>
        function simulateAuth() {
            const overlay = document.getElementById('reveal-overlay');
            const imgContainer = document.getElementById('secret-image-container');
            const badge = document.getElementById('unlocked-badge');
            
            // Start "Processing" animation
            const btn = overlay.querySelector('button');
            btn.innerHTML = '<span class="material-symbols-outlined animate-spin">sync</span>';
            
            setTimeout(() => {
                // Success State
                overlay.style.opacity = '0';
                setTimeout(() => {
                    overlay.classList.add('hidden');
                    imgContainer.style.filter = 'blur(0)';
                    imgContainer.style.opacity = '1';
                    imgContainer.style.transform = 'scale(1)';
                    badge.classList.remove('opacity-0');
                    badge.classList.add('opacity-100');
                }, 300);
            }, 800);
        }
    </script>
<style>
        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            25% { transform: translateX(-10px); }
            75% { transform: translateX(10px); }
        }
    </style>
