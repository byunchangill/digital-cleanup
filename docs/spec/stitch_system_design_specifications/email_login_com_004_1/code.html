<!DOCTYPE html><html lang="ko" style=""><head>
<meta charset="utf-8">
<meta content="width=device-width, initial-scale=1.0" name="viewport">

        body {
            font-family: 'Hanken Grotesk', sans-serif;
            -webkit-font-smoothing: antialiased;
            -moz-osx-font-smoothing: grayscale;
        }
        .material-symbols-outlined {

        }
        .input-shadow {
            box-shadow: 0px 2px 4px rgba(0,0,0,0.05), 0px 10px 20px rgba(0,0,0,0.02);
        }
        .focus-ring:focus-within {
            ring: 2px;
            ring-color: #3525cd;
            border-color: transparent;
        }
    </style>

                      "on-error-container": "#93000a",
                      "primary-fixed": "#e2dfff",
                      "tertiary": "#684000",
                      "secondary": "#006c49",
                      "on-primary": "#ffffff",
                      "on-surface": "#0b1c30",
                      "tertiary-fixed": "#ffddb8",
                      "surface-container": "#e5eeff",
                      "surface-tint": "#4d44e3",
                      "tertiary-container": "#885500",
                      "surface-variant": "#d3e4fe",
                      "on-primary-fixed-variant": "#3323cc",
                      "bg-secondary": "#F8FAFC",
                      "secondary-container": "#6cf8bb",
                      "inverse-primary": "#c3c0ff",
                      "error-container": "#ffdad6",
                      "primary-fixed-dim": "#c3c0ff",
                      "on-secondary": "#ffffff",
                      "outline": "#777587",
                      "error": "#ba1a1a",
                      "on-tertiary-fixed-variant": "#653e00",
                      "surface-container-low": "#eff4ff",
                      "on-primary-fixed": "#0f0069",
                      "surface-container-highest": "#d3e4fe",
                      "tertiary-fixed-dim": "#ffb95f",
                      "on-tertiary-container": "#ffd4a4",
                      "primary-container": "#4f46e5",

                      "secondary-fixed-dim": "#4edea3",
                      "surface-dim": "#cbdbf5",

                      "DEFAULT": "0.25rem",

              "spacing": {
                      "grid-gutter": "12px",
                      "container-padding": "20px",
                      "stack-gap-sm": "8px",
                      "base-unit": "4px",
                      "stack-gap-md": "16px",

<style>
    body {
      min-height: max(884px, 100dvh);
    }

<body class="bg-surface-container-lowest text-on-surface min-h-screen flex flex-col items-center justify-start overflow-x-hidden"><header class="fixed top-0 w-full z-50 flex justify-between items-center px-container-padding h-16 bg-surface-container-lowest border-b border-surface-border">
<button aria-label="뒤로 가기" class="w-10 h-10 flex items-center justify-center rounded-full hover:bg-surface-container-low transition-colors">
<span class="material-symbols-outlined text-on-surface" data-icon="arrow_back">arrow_back</span>
</button>
<h1 class="font-headline-sm text-headline-sm text-on-surface font-semibold">이메일 로그인</h1>
<div class="w-10"></div>
</header>
<main class="w-full max-w-md px-container-padding pt-24 pb-12 flex flex-col flex-grow bg-surface-container-lowest">
<section class="mb-10">
<h2 class="font-headline-lg-mobile text-headline-lg-mobile text-on-surface mb-2">반가워요!</h2>
<p class="font-body-lg text-body-lg text-on-surface-variant">다시 만나서 기뻐요. 계정 정보를 입력해주세요.</p>
</section>
<form class="flex flex-col gap-y-6 flex-grow">
<div class="flex flex-col gap-y-2">
<label class="font-body-md text-body-md text-on-surface-variant px-1" for="email">이메일 주소</label>
<div class="relative group">
<input class="w-full h-14 px-4 rounded-xl bg-surface border border-surface-border font-body-lg text-body-lg text-on-surface placeholder:text-text-muted input-shadow focus:outline-none focus:ring-2 focus:ring-primary focus:border-transparent transition-all duration-200" id="email" name="email" placeholder="이메일 주소 입력" type="email">
<span class="absolute right-4 top-1/2 -translate-y-1/2 material-symbols-outlined text-text-muted opacity-0 group-focus-within:opacity-100 transition-opacity" data-icon="alternate_email">alternate_email</span>
</div>
</div>
<div class="flex flex-col gap-y-2">
<label class="font-body-md text-body-md text-on-surface-variant px-1" for="password">비밀번호</label>
<div class="relative group">
<input class="w-full h-14 px-4 rounded-xl bg-surface border border-surface-border font-body-lg text-body-lg text-on-surface placeholder:text-text-muted input-shadow focus:outline-none focus:ring-2 focus:ring-primary focus:border-transparent transition-all duration-200" id="password" name="password" placeholder="비밀번호 입력" type="password">
<button class="absolute right-4 top-1/2 -translate-y-1/2 flex items-center justify-center" onclick="togglePassword()" type="button">
<span class="material-symbols-outlined text-text-muted" data-icon="visibility" id="password-toggle-icon">visibility</span>
</button>
</div>
<div class="flex justify-end">
<a class="font-body-md text-body-md text-primary font-medium hover:underline py-1" href="#">비밀번호 찾기</a>
</div>
</div>
<div class="mt-4">
<button class="w-full h-14 bg-primary text-on-primary rounded-xl font-headline-sm text-headline-sm font-semibold shadow-lg shadow-primary/20 hover:opacity-90 active:scale-[0.98] transition-all duration-150" type="submit">
                    로그인
                </button>
</div>
</form>
<footer class="mt-auto pt-8 flex flex-col items-center gap-y-6">
<div class="flex items-center gap-x-2 text-on-surface-variant font-body-md text-body-md">
<span class="">계정이 없으신가요?</span>
<a class="text-primary font-bold hover:underline" href="#">회원가입</a>
</div>
<div class="flex flex-col items-center gap-y-4 w-full">
<div class="flex items-center w-full gap-x-4">
<div class="h-px bg-surface-border flex-grow"></div>
<span class="text-caption font-caption text-text-muted uppercase tracking-widest">or</span>
<div class="h-px bg-surface-border flex-grow"></div>
</div>
<div class="flex gap-x-4">
<button class="w-11 h-11 rounded-full border border-surface-border flex items-center justify-center hover:bg-surface-container-low transition-colors shadow-sm overflow-hidden">
  <img src="https://lh3.googleusercontent.com/aida-public/AB6AXuAEd4WOPekfsNKbx_pCn5kZ6gUgnDlrghbCzHqcG_kWABu6S_hDiYg8gsH2gqkgNyfeEX7CYoKMOoB3YhObrzdskUrP5oKO9cIAooXjpVIPgZKxbHdGZbWF0HDrXyoiwxMpgzCwAdlaggvFzbEp0xOIw4OanaTtJLFadgHeixLSFcvZ3GeRzl4Tr_mkTCdsbP6UwBexpJVx9ZFif9vx_DlzFinia2DuUhcIcbJvRFr25GvD-wPL0Gc22W76if49bjLFQcJ5J63E9x4" alt="KakaoTalk" class="w-6 h-6 object-contain">
</button>
<button class="w-11 h-11 rounded-full border border-surface-border flex items-center justify-center hover:bg-surface-container-low transition-colors shadow-sm overflow-hidden">
  <img src="https://upload.wikimedia.org/wikipedia/commons/c/c1/Google_%22G%22_logo.svg" alt="Google" class="w-6 h-6 object-contain">
</button>

</div>
</div>
</footer>
</main>

</body></html>
