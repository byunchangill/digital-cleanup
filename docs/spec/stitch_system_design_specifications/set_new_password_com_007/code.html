<!DOCTYPE html>

<html class="light" lang="ko"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0, viewport-fit=cover" name="viewport"/>
<title>Sortmate - 새 비밀번호 설정</title>
<!-- Fonts -->
<link href="https://fonts.googleapis.com/css2?family=Hanken+Grotesk:wght@400;500;600;700&amp;family=JetBrains+Mono:wght@500&amp;display=swap" rel="stylesheet"/>
<!-- Icons -->
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<!-- Tailwind -->
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<script id="tailwind-config">
      tailwind.config = {
        darkMode: "class",
        theme: {
          extend: {
            "colors": {
                    "on-primary-container": "#dad7ff",
                    "secondary-fixed-dim": "#4edea3",
                    "tertiary-fixed-dim": "#ffb95f",
                    "inverse-surface": "#213145",
                    "bg-primary": "#FFFFFF",
                    "surface-container-highest": "#d3e4fe",
                    "text-main": "#0F172A",
                    "tertiary": "#684000",
                    "surface-container-high": "#dce9ff",
                    "surface-bright": "#f8f9ff",
                    "on-error-container": "#93000a",
                    "on-tertiary": "#ffffff",
                    "error": "#ba1a1a",
                    "background": "#f8f9ff",
                    "outline": "#777587",
                    "secondary-fixed": "#6ffbbe",
                    "on-primary-fixed": "#0f0069",
                    "on-surface-variant": "#464555",
                    "on-tertiary-container": "#ffd4a4",
                    "error-container": "#ffdad6",
                    "primary": "#3525cd",
                    "on-primary-fixed-variant": "#3323cc",
                    "surface-container-lowest": "#ffffff",
                    "surface": "#f8f9ff",
                    "vault-blur": "rgba(255, 255, 255, 0.4)",
                    "on-secondary-fixed-variant": "#005236",
                    "surface-tint": "#4d44e3",
                    "on-surface": "#0b1c30",
                    "surface-container": "#e5eeff",
                    "primary-fixed-dim": "#c3c0ff",
                    "outline-variant": "#c7c4d8",
                    "on-secondary-container": "#00714d",
                    "tertiary-container": "#885500",
                    "on-secondary-fixed": "#002113",
                    "on-error": "#ffffff",
                    "bg-secondary": "#F8FAFC",
                    "primary-fixed": "#e2dfff",
                    "surface-border": "#E2E8F0",
                    "primary-container": "#4f46e5",
                    "secondary-container": "#6cf8bb",
                    "surface-dim": "#cbdbf5",
                    "secondary": "#006c49",
                    "on-tertiary-fixed": "#2a1700",
                    "tertiary-fixed": "#ffddb8",
                    "surface-variant": "#d3e4fe",
                    "on-secondary": "#ffffff",
                    "on-primary": "#ffffff",
                    "inverse-primary": "#c3c0ff",
                    "inverse-on-surface": "#eaf1ff",
                    "on-tertiary-fixed-variant": "#653e00",
                    "on-background": "#0b1c30",
                    "text-muted": "#64748B",
                    "surface-container-low": "#eff4ff"
            },
            "borderRadius": {
                    "DEFAULT": "0.25rem",
                    "lg": "0.5rem",
                    "xl": "0.75rem",
                    "full": "9999px"
            },
            "spacing": {
                    "grid-gutter": "12px",
                    "stack-gap-lg": "24px",
                    "container-padding": "20px",
                    "stack-gap-md": "16px",
                    "stack-gap-sm": "8px",
                    "base-unit": "4px"
            },
            "fontFamily": {
                    "label-caps": ["JetBrains Mono"],
                    "headline-sm": ["Hanken Grotesk"],
                    "body-md": ["Hanken Grotesk"],
                    "caption": ["Hanken Grotesk"],
                    "body-lg": ["Hanken Grotesk"],
                    "headline-md": ["Hanken Grotesk"],
                    "headline-lg-mobile": ["Hanken Grotesk"],
                    "display-lg": ["Hanken Grotesk"]
            }
          }
        }
      }
    </script>
<style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
        .step-active { width: 32px; transition: all 0.3s ease; }
        .step-inactive { width: 8px; transition: all 0.3s ease; }
        .glass-card {
            background: rgba(255, 255, 255, 0.7);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.3);
        }
    </style>
<style>
        body {
          min-height: max(884px, 100dvh);
        }
    </style>
</head>
<body class="bg-background text-on-background min-h-screen font-body-md selection:bg-primary-container selection:text-white">
<!-- Header Suppression: TopAppBar is suppressed for Transactional flow per Shell Visibility Rule -->
<main class="relative flex flex-col items-center justify-center min-h-screen px-container-padding py-stack-gap-lg overflow-hidden">
<!-- Background Atmospheric Element -->
<div class="absolute top-[-10%] right-[-10%] w-96 h-96 bg-primary/5 rounded-full blur-3xl animate-pulse"></div>
<div class="absolute bottom-[-5%] left-[-5%] w-80 h-80 bg-secondary-container/10 rounded-full blur-3xl"></div>
<div class="w-full max-w-md z-10">
<!-- Back Action -->
<button class="mb-stack-gap-lg group flex items-center gap-2 text-on-surface-variant hover:text-primary transition-colors" onclick="history.back()">
<span class="material-symbols-outlined text-[20px]">arrow_back</span>
<span class="font-body-md text-body-md">뒤로</span>
</button>
<!-- Brand Identity Section -->
<div class="mb-stack-gap-lg text-center">
<div class="inline-flex items-center justify-center w-16 h-16 rounded-2xl bg-primary text-on-primary shadow-lg shadow-primary/20 mb-stack-gap-md">
<span class="material-symbols-outlined text-[32px]" style="font-variation-settings: 'FILL' 1;">lock_reset</span>
</div>
<h1 class="font-headline-lg-mobile text-headline-lg-mobile text-on-surface tracking-tight mb-2">새 비밀번호 설정</h1>
<p class="font-body-md text-body-md text-on-surface-variant px-4">큐레이션된 에셋과 Sortmate 라이브러리를 보호하기 위해 강력하고 안전한 비밀번호를 만드세요.</p>
</div>
<!-- Progress Tracker -->
<div class="flex justify-center items-center gap-2 mb-stack-gap-lg">
<div class="h-2 rounded-full bg-primary/20 step-inactive"></div>
<div class="h-2 rounded-full bg-primary/20 step-inactive"></div>
<div class="h-2 rounded-full bg-primary step-active"></div>
</div>
<!-- Main Form Card -->
<div class="glass-card p-stack-gap-lg rounded-[24px] shadow-[0px_20px_40px_rgba(0,0,0,0.04)]">
<form class="space-y-stack-gap-lg" onsubmit="return false">
<!-- New Password Input -->
<div class="space-y-stack-gap-sm">
<label class="block font-label-caps text-label-caps text-on-surface-variant tracking-wider uppercase" for="password">새 비밀번호</label>
<div class="relative group">
<input class="w-full px-5 py-4 bg-surface-container-low border border-outline-variant rounded-xl focus:ring-2 focus:ring-primary/20 focus:border-primary outline-none transition-all font-body-md text-body-lg placeholder:text-outline" id="password" placeholder="최소 12자" type="password"/>
<button class="absolute right-4 top-1/2 -translate-y-1/2 text-on-surface-variant hover:text-primary transition-colors" type="button">
<span class="material-symbols-outlined text-[20px]">visibility</span>
</button>
</div>
<!-- Strength Meter (Interactive Simulation) -->
<div class="pt-2">
<div class="flex justify-between items-center mb-1">
<span class="text-caption font-caption text-on-surface-variant">보안 강도</span>
<span class="text-caption font-caption text-secondary font-bold">강함</span>
</div>
<div class="h-1.5 w-full bg-surface-container-highest rounded-full overflow-hidden flex gap-1">
<div class="h-full w-1/4 bg-secondary rounded-full"></div>
<div class="h-full w-1/4 bg-secondary rounded-full"></div>
<div class="h-full w-1/4 bg-secondary rounded-full"></div>
<div class="h-full w-1/12 bg-outline-variant rounded-full"></div>
</div>
</div>
</div>
<!-- Confirm Password Input -->
<div class="space-y-stack-gap-sm">
<label class="block font-label-caps text-label-caps text-on-surface-variant tracking-wider uppercase" for="confirm-password">비밀번호 확인</label>
<div class="relative group">
<input class="w-full px-5 py-4 bg-surface-container-low border border-outline-variant rounded-xl focus:ring-2 focus:ring-primary/20 focus:border-primary outline-none transition-all font-body-md text-body-lg placeholder:text-outline" id="confirm-password" placeholder="비밀번호를 다시 입력하세요" type="password"/>
<button class="absolute right-4 top-1/2 -translate-y-1/2 text-on-surface-variant hover:text-primary transition-colors" type="button">
<span class="material-symbols-outlined text-[20px]">visibility</span>
</button>
</div>
</div>
<!-- Guidelines -->
<div class="bg-surface-container p-4 rounded-xl space-y-2">
<div class="flex items-start gap-3">
<span class="material-symbols-outlined text-secondary text-[18px]" style="font-variation-settings: 'FILL' 1;">check_circle</span>
<p class="font-caption text-caption text-on-surface-variant">최소 하나의 대문자와 하나의 특수 문자를 포함해야 합니다.</p>
</div>
<div class="flex items-start gap-3">
<span class="material-symbols-outlined text-secondary text-[18px]" style="font-variation-settings: 'FILL' 1;">check_circle</span>
<p class="font-caption text-caption text-on-surface-variant">"123"이나 "password"와 같은 흔한 패턴은 피하세요.</p>
</div>
</div>
<!-- Submit Button -->
<button class="w-full bg-primary hover:bg-primary-container text-on-primary font-body-lg text-body-lg py-4 rounded-xl shadow-lg shadow-primary/20 transition-all active:scale-[0.98] flex items-center justify-center gap-2">
                        비밀번호 변경
                        <span class="material-symbols-outlined">arrow_forward</span>
</button>
</form>
</div>
<!-- Footer Help -->
<p class="mt-stack-gap-lg text-center font-body-md text-body-md text-on-surface-variant">
                도움이 더 필요하신가요? <a class="text-primary font-bold hover:underline decoration-2 underline-offset-4" href="#">고객 센터</a>
</p>
</div>
<!-- Decorative UI Element: Image Placeholder -->
<div class="hidden lg:block absolute left-12 top-1/2 -translate-y-1/2 w-64 h-80 rounded-3xl overflow-hidden shadow-2xl rotate-[-4deg] opacity-40 hover:opacity-100 transition-opacity duration-500 border-4 border-white">
<div class="w-full h-full bg-cover bg-center" data-alt="A premium close-up of a sleek digital vault interface with frosted glass textures and deep indigo ambient lighting. The visual style is modern minimalist with soft glows and precise vector lines, evoking high-end digital security and organized intelligence. A sense of professional reliability and proactive data protection is central to the mood." style="background-image: url('https://lh3.googleusercontent.com/aida-public/AB6AXuA2va5n3njAlnWLCk0aZURm1Pl5t4u3TBt_P8c9kyiL8fleVO9H3ix4Ksb9bhWA15DRwQHxrDaCJqMMQKV726Nc0MMQalVs1VWEYFmmBR2bYtN0xyrYFli8_Qsh_fOj5ZJoqt5Htm-FqXlFGgmcP4YLN-hsumitFS8kuFJtz91yaqBOnpMPyKRi9igz2G5cq0_vwTW2YermJadxsWTD7ZdvX7-WeJQSWqLqbzs_r9-idpqgZqoOZh5xkcJcs13bSEpnrXVuQWqozZc')"></div>
</div>
</main>
<!-- Bottom Toast Placeholder (Hidden by default) -->
<div class="fixed bottom-10 left-1/2 -translate-x-1/2 translate-y-20 opacity-0 transition-all duration-500 z-50" id="toast">
<div class="bg-on-background text-background px-6 py-4 rounded-xl shadow-2xl flex items-center gap-3">
<span class="material-symbols-outlined text-secondary-fixed">check_circle</span>
<span class="font-body-md">비밀번호가 성공적으로 업데이트되었습니다.</span>
</div>
</div>
<script>
        // Micro-interactions and simulation logic
        document.querySelector('form').addEventListener('submit', function(e) {
            e.preventDefault();
            const toast = document.getElementById('toast');
            toast.classList.remove('translate-y-20', 'opacity-0');
            toast.classList.add('translate-y-0', 'opacity-100');
            
            setTimeout(() => {
                toast.classList.add('translate-y-20', 'opacity-0');
                toast.classList.remove('translate-y-0', 'opacity-100');
            }, 3000);
        });

        // Toggle visibility simulation
        document.querySelectorAll('button[type="button"]').forEach(btn => {
            btn.addEventListener('click', function() {
                const input = this.parentElement.querySelector('input');
                const icon = this.querySelector('.material-symbols-outlined');
                if (input.type === 'password') {
                    input.type = 'text';
                    icon.textContent = 'visibility_off';
                } else {
                    input.type = 'password';
                    icon.textContent = 'visibility';
                }
            });
        });
    </script>
</body></html>
