<style>
    body {
      background-color: #f8f9ff;
      font-family: 'Hanken Grotesk', sans-serif;
    }
    .progress-bar-fill {
      transition: width 1s cubic-bezier(0.4, 0, 0.2, 1);
    }
    .secure-pulse {
      animation: pulse-ring 2s cubic-bezier(0.4, 0, 0.6, 1) infinite;
    }
    @keyframes pulse-ring {
      0% { transform: scale(0.95); opacity: 0.8; }
      50% { transform: scale(1.05); opacity: 0.4; }
      100% { transform: scale(0.95); opacity: 0.8; }
    }
    .floating-card {
      box-shadow: 0px 2px 4px rgba(0,0,0,0.05), 0px 10px 20px rgba(0,0,0,0.02);
    }

<style>
    body {
      min-height: max(884px, 100dvh);
    }

<body class="flex flex-col min-h-screen text-on-surface">
<!-- TopAppBar -->
<header class="fixed top-0 w-full z-50 flex justify-between items-center px-container-padding h-16 bg-surface dark:bg-on-background shadow-sm">
<div class="flex items-center gap-stack-gap-md">
<button class="material-symbols-outlined text-on-surface-variant hover:opacity-80 transition-opacity" data-icon="close">close</button>
<h1 class="font-headline-sm text-headline-sm text-primary font-bold">데이터 내보내기</h1>
</div>
<div class="w-8 h-8 rounded-full overflow-hidden bg-surface-container">
<img class="w-full h-full object-cover" data-alt="A professional studio portrait of a young tech-savvy user in a bright, modern office setting. The lighting is soft and high-key, emphasizing a clean and organized aesthetic that aligns with a high-end digital assistant brand. The subject is wearing professional yet comfortable attire in a palette of indigo and soft greys, looking directly at the camera with a calm and confident expression." src="https://lh3.googleusercontent.com/aida-public/AB6AXuDlmcQp8iQzKWqIfFnBPwnm5a_s8cSLR_Hht2A99TMOrXHcHjWKa8G7p11RdGLYF0BVCQOG8Qp3snOYr18ZChn5OsYnG5_IBtxp3GYj_2FYQUWXLaUkD8k_k5CTOwU7vnQHrNERhV-wsRUIpOe-d9u3P9PirVnnwPKdhgtXPQaeToI23GjZQRngqVl3wofhjmaiurVgL5kwj7sIO_Mn5VBELfLaUEzzaG0QTdPkok5UHeLE_r3lmgQElwjQvDEaiHMXtguMVL5HIvE"/>
</div>
</header>
<!-- Main Content Canvas -->
<main class="flex-grow pt-24 pb-12 px-container-padding flex flex-col items-center justify-center">
<!-- Central Progress Module -->
<div class="w-full max-w-md flex flex-col items-center gap-stack-gap-lg">
<!-- Secure Icon Visual -->
<div class="relative mb-stack-gap-md">
<div class="w-24 h-24 rounded-full bg-primary-fixed flex items-center justify-center text-primary relative z-10">
<span class="material-symbols-outlined text-[48px]" style="font-variation-settings: 'FILL' 1;">enhanced_encryption</span>
</div>
<div class="absolute inset-0 bg-primary opacity-20 rounded-full secure-pulse -z-0"></div>
</div>
<!-- Heading & Status -->
<div class="text-center space-y-2">
<h2 class="font-headline-lg-mobile text-headline-lg-mobile text-on-surface">데이터 내보내는 중</h2>
<p class="font-body-md text-body-md text-on-surface-variant max-w-[280px] mx-auto">
          자산을 수집하고 아카이브를 준비하고 있습니다...
        </p>
</div>
<!-- Progress Indicators -->
<div class="w-full bg-surface-container-low p-stack-gap-md rounded-xl floating-card space-y-stack-gap-md">
<div class="flex justify-between items-end">
<div class="flex flex-col">
<span class="font-label-caps text-label-caps text-primary uppercase tracking-widest">현재 작업</span>
<span class="font-body-lg text-body-lg font-semibold" id="task-name">고화질 미디어 압축 중</span>
</div>
<span class="font-display-lg text-display-lg text-primary" id="percent-text">65%</span>
</div>
<!-- Progress Bar -->
<div class="w-full h-3 bg-surface-container rounded-full overflow-hidden">
<div class="progress-bar-fill h-full bg-primary rounded-full" id="progress-bar" style="width: 65%;"></div>
</div>
<!-- Security Badge -->
<div class="flex items-center gap-2 bg-surface p-2 rounded-lg border border-surface-border">
<span class="material-symbols-outlined text-secondary text-[18px]">verified_user</span>
<span class="font-caption text-caption text-secondary">종단간 암호화된 JSON 패키지</span>
</div>
</div>
<!-- Action Footer -->
<div class="w-full mt-stack-gap-lg flex flex-col gap-stack-gap-md">
<button class="w-full py-4 bg-primary text-on-primary rounded-xl font-body-lg font-bold shadow-lg hover:opacity-90 active:scale-95 transition-all">
          백그라운드에서 진행
        </button>
<button class="w-full py-3 bg-transparent text-error font-body-md font-semibold hover:bg-error-container/10 rounded-xl transition-colors">
          내보내기 취소
        </button>
</div>
</div>
<!-- Background Decoration -->
<div class="fixed top-1/4 -left-12 w-64 h-64 bg-primary-container/5 rounded-full blur-3xl -z-10"></div>
<div class="fixed bottom-1/4 -right-12 w-48 h-48 bg-secondary-container/5 rounded-full blur-3xl -z-10"></div>
</main>
<script>
    // Micro-interaction: Progress Bar Simulation
    let progress = 65;
    const bar = document.getElementById('progress-bar');
    const text = document.getElementById('percent-text');
    const taskLabel = document.getElementById('task-name');
    
    const tasks = [
      "메타데이터 수집 중...",
      "보안 금고 키 추출 중...",
      "고화질 미디어 압축 중",
      "JSON 아카이브 구성 중...",
      "보안 패키지 마무리 중..."
    ];

    setInterval(() => {
      if (progress < 99) {
        progress += Math.random() * 2;
        if (progress > 99) progress = 99;
        
        bar.style.width = `${progress}%`;
        text.innerText = `${Math.floor(progress)}%`;
        
        // Update task labels based on progress thresholds
        if (progress > 85) taskLabel.innerText = tasks[4];
        else if (progress > 75) taskLabel.innerText = tasks[3];
      }
    }, 3000);
  </script>
</body></html>
