<!DOCTYPE html>

<style>
        body {
            font-family: 'Hanken Grotesk', sans-serif;
            -webkit-tap-highlight-color: transparent;
        }
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
            user-select: none;
        }
        .custom-shadow-l1 {
            box-shadow: 0px 2px 4px rgba(0,0,0,0.05), 0px 10px 20px rgba(0,0,0,0.02);
        }
        .custom-shadow-fab {
            box-shadow: 0 8px 24px rgba(79, 70, 229, 0.25);
        }
        /* Custom scrollbar suppression for cleaner UI */
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-surface text-on-surface">
<!-- Header (TopAppBar) -->
<header class="bg-surface/80 backdrop-blur-md sticky top-0 z-40 w-full">
<div class="flex items-center justify-between px-margin-mobile h-16 w-full max-w-[480px] mx-auto">
<button class="w-10 h-10 flex items-center justify-start text-on-surface hover:bg-surface-container-high rounded-full transition-colors active:scale-95 duration-150">
<span class="material-symbols-outlined">close</span>
</button>
<h1 class="font-headline-sm text-headline-sm text-on-surface">아이템 편집</h1>
<button class="px-4 py-2 bg-primary-container text-on-primary-container rounded-xl font-bold text-body-md hover:opacity-90 active:scale-95 transition-all">
                저장
            </button>
</div>
</header>
<main class="max-w-[480px] mx-auto pb-32">
<!-- Thumbnail Preview Area -->
<section class="mt-stack-gap-lg px-margin-mobile flex justify-center">
<div class="relative w-40 h-40 rounded-xl overflow-hidden custom-shadow-l1 border-2 border-surface-container">
<img class="w-full h-full object-cover" data-alt="A high-quality studio photograph of a Starbucks iced americano coffee cup, featuring the iconic green siren logo. The lighting is soft and professional, with a clean white background. The image has a modern, minimalist aesthetic with refreshing condensation on the cup, representing a digital gift coupon thumbnail for an intelligent productivity app." src="https://lh3.googleusercontent.com/aida-public/AB6AXuDb0g2FW_pOOvK8y2IGwWwygg1k_g1XCYCgg80PdvsnMxLsVe30qmVqfJW1EGTA5F3--M54zzuemhDvestC-P8lq9frVbnnybL9IA5PQ4-iRDWWMpZiaGzubmIXRDxkPtWYVMnbiJzyiMkYUQ5B7poe4fesqj1sxq9qQ7Zc1HXdjstKwsOxX3ij653MnxhZB7vSy9C8Fy6H7QDMQ_DXoVpheC3ZQWyjYxwvcPyjDQQdZPiW_O5bSfv1JJcukoQd_rkoBVO3APO7O3k"/>
<div class="absolute inset-0 bg-black/20 flex items-center justify-center opacity-0 hover:opacity-100 transition-opacity cursor-pointer">
<div class="bg-surface/90 p-2 rounded-full shadow-lg">
<span class="material-symbols-outlined text-primary">photo_camera</span>
</div>
</div>
<button class="absolute bottom-2 right-2 bg-primary text-on-primary w-8 h-8 rounded-full flex items-center justify-center shadow-lg active:scale-90 transition-transform">
<span class="material-symbols-outlined text-[18px]" style="font-variation-settings: 'FILL' 1;">edit</span>
</button>
</div>
</section>
<!-- Form Fields -->
<section class="mt-stack-gap-lg px-margin-mobile space-y-stack-gap-lg">
<!-- Title Input -->
<div class="space-y-2">
<label class="text-label-caps font-label-caps text-on-surface-variant flex items-center gap-1 uppercase">
<span class="material-symbols-outlined text-[14px]">title</span> 제목
                </label>
<input class="w-full px-4 py-3 bg-surface-container-lowest border-none rounded-xl focus:ring-2 focus:ring-primary/20 text-body-lg font-body-lg custom-shadow-l1 text-on-surface" type="text" value="스타벅스 아메리카노 쿠폰"/>
</div>
<!-- Category Dropdown -->
<div class="space-y-2">
<label class="text-label-caps font-label-caps text-on-surface-variant flex items-center gap-1 uppercase">
<span class="material-symbols-outlined text-[14px]">category</span> 카테고리
                </label>
<div class="relative">
<select class="w-full appearance-none px-4 py-3 bg-surface-container-lowest border-none rounded-xl focus:ring-2 focus:ring-primary/20 text-body-lg font-body-lg custom-shadow-l1 text-on-surface">
<option value="coupon">쿠폰</option>
<option value="receipt">영수증</option>
<option value="link">링크</option>
<option value="memo">메모</option>
</select>
<span class="material-symbols-outlined absolute right-4 top-1/2 -translate-y-1/2 pointer-events-none text-outline">expand_more</span>
</div>
</div>
<!-- Tag Management -->
<div class="space-y-2">
<label class="text-label-caps font-label-caps text-on-surface-variant flex items-center gap-1 uppercase">
<span class="material-symbols-outlined text-[14px]">sell</span> 태그 관리
                </label>
<div class="bg-surface-container-lowest p-4 rounded-xl custom-shadow-l1 space-y-3">
<div class="flex flex-wrap gap-2">
<!-- Tag Chips -->
<span class="inline-flex items-center gap-1 px-3 py-1 bg-primary/10 text-primary rounded-full text-caption font-medium border border-primary/10">
                            #쿠폰
                            <button class="hover:bg-primary/20 rounded-full flex items-center justify-center w-4 h-4"><span class="material-symbols-outlined text-[14px]">close</span></button>
</span>
<span class="inline-flex items-center gap-1 px-3 py-1 bg-primary/10 text-primary rounded-full text-caption font-medium border border-primary/10">
                            #스타벅스
                            <button class="hover:bg-primary/20 rounded-full flex items-center justify-center w-4 h-4"><span class="material-symbols-outlined text-[14px]">close</span></button>
</span>
<span class="inline-flex items-center gap-1 px-3 py-1 bg-primary/10 text-primary rounded-full text-caption font-medium border border-primary/10">
                            #음료
                            <button class="hover:bg-primary/20 rounded-full flex items-center justify-center w-4 h-4"><span class="material-symbols-outlined text-[14px]">close</span></button>
</span>
<span class="inline-flex items-center gap-1 px-3 py-1 bg-primary/10 text-primary rounded-full text-caption font-medium border border-primary/10">
                            #선물
                            <button class="hover:bg-primary/20 rounded-full flex items-center justify-center w-4 h-4"><span class="material-symbols-outlined text-[14px]">close</span></button>
</span>
</div>
<div class="relative">
<input class="w-full bg-transparent border-b border-outline-variant focus:border-primary border-0 focus:ring-0 px-0 py-2 text-body-md placeholder:text-outline-variant" placeholder="새 태그 추가..." type="text"/>
<button class="absolute right-0 top-1/2 -translate-y-1/2 text-primary">
<span class="material-symbols-outlined">add</span>
</button>
</div>
</div>
</div>
<!-- AI Summary Section -->
<div class="space-y-2">
<label class="text-label-caps font-label-caps text-on-surface-variant flex items-center gap-1 uppercase">
<span class="material-symbols-outlined text-[14px]">auto_awesome</span> AI 분석 요약
                </label>
<div class="bg-surface-container-low p-4 rounded-xl border border-surface-variant">
<p class="text-body-md text-on-surface-variant leading-relaxed">
                        이 아이템은 스타벅스 아이스 아메리카노 Tall 사이즈 쿠폰입니다. 유효기간은 2024년 12월 31일까지이며, 전국 매장에서 사용 가능합니다. 카카오톡 선물하기를 통해 수신된 것으로 분석되었습니다.
                    </p>
<div class="mt-3 flex items-center gap-2 text-caption text-primary font-medium">
<span class="material-symbols-outlined text-[16px]">info</span>
                        AI 요약은 편집할 수 없습니다.
                    </div>
</div>
</div>
<!-- AI Re-analysis Action -->
<button class="w-full flex items-center justify-center gap-2 py-4 bg-surface-container-lowest border border-primary text-primary rounded-xl font-bold hover:bg-primary/5 active:scale-[0.98] transition-all custom-shadow-l1 mt-8">
<span class="material-symbols-outlined">refresh</span>
                AI 재분석 요청
            </button>
</section>
<!-- Danger Zone -->
<section class="mt-12 px-margin-mobile mb-10">
<button class="w-full flex items-center justify-center gap-2 py-3 text-error font-medium text-body-md hover:bg-error/5 rounded-xl transition-colors">
<span class="material-symbols-outlined text-[20px]">delete_outline</span>
                아이템 삭제하기
            </button>
</section>
</main>
<!-- Success Toast (Hidden by default) -->
<div class="fixed bottom-10 left-1/2 -translate-x-1/2 bg-inverse-surface text-inverse-on-surface px-6 py-3 rounded-full flex items-center gap-3 custom-shadow-fab opacity-0 translate-y-10 transition-all pointer-events-none z-[60]" id="save-toast">
<span class="material-symbols-outlined text-emerald-400">check_circle</span>
<span class="font-medium text-body-md">변경사항이 저장되었습니다.</span>
</div>
<script>
        // Micro-interaction for the Save button
        const saveBtn = document.querySelector('button.bg-primary-container');
        const toast = document.getElementById('save-toast');

        saveBtn?.addEventListener('click', () => {
            // Visual feedback on button
            saveBtn.innerHTML = '<span class="material-symbols-outlined animate-spin">sync</span>';
            
            setTimeout(() => {
                saveBtn.innerHTML = '저장';
                
                // Show toast
                toast.classList.remove('opacity-0', 'translate-y-10', 'pointer-events-none');
                toast.classList.add('opacity-100', 'translate-y-0');
                
                // Hide toast after 3s
                setTimeout(() => {
                    toast.classList.add('opacity-0', 'translate-y-10', 'pointer-events-none');
                    toast.classList.remove('opacity-100', 'translate-y-0');
                }, 3000);
            }, 800);
        });

        // Simple tag remove interaction
        document.querySelectorAll('.inline-flex button').forEach(btn => {
            btn.addEventListener('click', function() {
                this.parentElement.style.opacity = '0';
                this.parentElement.style.transform = 'scale(0.8)';
                setTimeout(() => {
                    this.parentElement.remove();
                }, 200);
            });
        });
    </script>
</body></html>
