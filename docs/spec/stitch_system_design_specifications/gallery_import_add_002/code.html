<!-- Script for Gallery Interactions -->
<script>
        let selectedCount = 1; // Starting with the pre-selected item
        const counterEl = document.getElementById('counter');
        const importBtn = document.getElementById('import-button');

        function toggleSelect(el) {
            const indicator = el.querySelector('.selection-indicator');
            const checkIcon = indicator.querySelector('.material-symbols-outlined');
            const isSelected = el.classList.contains('selected');

            if (isSelected) {
                el.classList.remove('selected');
                indicator.classList.remove('bg-primary');
                indicator.classList.add('bg-black/20');
                checkIcon.classList.add('hidden');
                
                // Remove overlay
                const overlay = el.querySelector('.selected-overlay');
                if (overlay) overlay.remove();
                
                selectedCount--;
            } else {
                el.classList.add('selected');
                indicator.classList.remove('bg-black/20');
                indicator.classList.add('bg-primary');
                checkIcon.classList.remove('hidden');
                
                // Add overlay
                const overlay = document.createElement('div');
                overlay.className = 'absolute inset-0 selected-overlay';
                el.appendChild(overlay);
                
                selectedCount++;
            }

            // Update UI
            counterEl.textContent = selectedCount;
            if (selectedCount === 0) {
                importBtn.disabled = true;
                importBtn.classList.add('opacity-50', 'grayscale');
            } else {
                importBtn.disabled = false;
                importBtn.classList.remove('opacity-50', 'grayscale');
            }
        }

        function switchTab(tab) {
            const allBtn = document.getElementById('tab-all');
            const screenBtn = document.getElementById('tab-screenshots');
            
            if (tab === 'all') {
                allBtn.classList.add('border-primary', 'text-primary');
                allBtn.classList.remove('border-transparent', 'text-text-muted');
                screenBtn.classList.add('border-transparent', 'text-text-muted');
                screenBtn.classList.remove('border-primary', 'text-primary');
            } else {
                screenBtn.classList.add('border-primary', 'text-primary');
                screenBtn.classList.remove('border-transparent', 'text-text-muted');
                allBtn.classList.add('border-transparent', 'text-text-muted');
                allBtn.classList.remove('border-primary', 'text-primary');
            }
        }
    </script>
</body></html>
