<script>
        // Simple Interaction logic
        document.querySelectorAll('.group').forEach(item => {
            item.addEventListener('click', function() {
                this.classList.toggle('selected-item');
                const check = this.querySelector('.absolute.top-2.right-2');
                if (this.classList.contains('selected-item')) {
                    check.className = 'absolute top-2 right-2 w-6 h-6 bg-primary rounded-full flex items-center justify-center text-white';
                    check.innerHTML = '<span class="material-symbols-outlined text-[18px]" style="font-variation-settings: \'FILL\' 1;">check_circle</span>';
                } else {
                    check.className = 'absolute top-2 right-2 w-6 h-6 border-2 border-outline-variant bg-white/50 rounded-full flex items-center justify-center';
                    check.innerHTML = '';
                }
                updateSelectionCount();
            });
        });

        function updateSelectionCount() {
            const count = document.querySelectorAll('.selected-item').length;
            const headline = document.querySelector('header h1');
            headline.textContent = `${count}개 항목 선택됨`;
            
            // Hide selection bar if nothing selected
            const bar = document.querySelector('.fixed.bottom-0');
            if (count === 0) {
                bar.classList.add('translate-y-full');
            } else {
                bar.classList.remove('translate-y-full');
            }
        }
