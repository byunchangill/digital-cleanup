<span class="material-symbols-outlined" style="font-variation-settings: 'FILL' 1;">delete_forever</span>
            4개 항목 휴지통으로 이동
        </button>

<script>
    function updateCounter() {
        const checkboxes = document.querySelectorAll('input[type="checkbox"]');
        const checkedCount = Array.from(checkboxes).filter(c => c.checked).length;
        const trashBtn = document.getElementById('trash-btn');
        const selectionText = document.getElementById('selection-text');

        selectionText.textContent = `${checkedCount}개 항목 선택됨`;
        trashBtn.innerHTML = `
                <span class="material-symbols-outlined" style="font-variation-settings: 'FILL' 1;">delete_forever</span>
                ${checkedCount}개 항목 휴지통으로 이동
            `;

        if (checkedCount === 0) {
            trashBtn.disabled = true;
            trashBtn.classList.add('opacity-50', 'grayscale');
        } else {
            trashBtn.disabled = false;
            trashBtn.classList.remove('opacity-50', 'grayscale');
        }
    }

    function toggleSelectAll(btn) {
        const checkboxes = document.querySelectorAll('input[type="checkbox"]');
        const allChecked = Array.from(checkboxes).every(c => c.checked);
        
        checkboxes.forEach(c => {
            c.checked = !allChecked;
        });

        btn.textContent = allChecked ? '전체 선택' : '전체 해제';
        updateCounter();
    }

    // Initialize state
    updateCounter();

    // Simple button interaction
    document.getElementById('trash-btn').addEventListener('click', function() {
        const checkedCount = Array.from(document.querySelectorAll('input[type="checkbox"]')).filter(c => c.checked).length;
        if (checkedCount > 0) {
            this.innerHTML = `<span class="material-symbols-outlined animate-spin">refresh</span> 처리 중...`;
            setTimeout(() => {
                alert(`${checkedCount}개 항목이 휴지통으로 이동되었습니다. 저장 공간 확보: 4.2 MB`);
                window.history.back();
            }, 1200);
        }
    });
</script>
