<body class="bg-surface text-on-surface font-body-md overflow-x-hidden selection:bg-primary-container selection:text-on-primary-container">
<!-- Transactional Header -->
<nav class="fixed top-0 left-0 w-full h-16 flex items-center px-container-padding bg-surface/80 backdrop-blur-md z-50 transition-all duration-300">
<button class="w-10 h-10 flex items-center justify-center rounded-full hover:bg-surface-container transition-colors" onclick="history.back()">
<span class="material-symbols-outlined text-on-surface">arrow_back</span>
</button>
<span class="ml-4 font-headline-sm text-headline-sm text-on-surface">계정 복구</span>
</nav>
<!-- Main Canvas -->
<main class="min-h-screen pt-24 pb-12 px-container-padding flex flex-col items-center justify-center">
<div class="w-full max-w-md animate-in fade-in slide-in-from-bottom-4 duration-700">
<!-- Brand Anchor/Visual Identity -->
<div class="flex flex-col items-center mb-10">
<div class="w-20 h-20 bg-primary-container rounded-3xl flex items-center justify-center shadow-lg shadow-primary/10 mb-6 relative overflow-hidden group">
<div class="absolute inset-0 bg-white/10 opacity-0 group-hover:opacity-100 transition-opacity duration-300"></div>
<span class="material-symbols-outlined text-on-primary-container text-4xl" style="font-variation-settings: 'FILL' 1;">lock_reset</span>
</div>
<h1 class="font-headline-lg-mobile text-headline-lg-mobile text-text-main text-center">로그인에 문제가 있나요?</h1>
<p class="mt-2 text-text-muted text-body-lg text-center max-w-xs">
                    Sortmate 계정에 안전하게 다시 접속하려면 복구 방법을 선택하세요.
                </p>
</div>
<!-- Recovery Options -->
<div class="space-y-4">
<!-- Option 1: Email Recovery -->
<button class="w-full group relative flex items-center p-5 bg-bg-primary rounded-xl border border-surface-border hover:border-primary/30 transition-all duration-200 text-left shadow-sm hover:shadow-md hover:-translate-y-0.5 active:translate-y-0">
<div class="w-12 h-12 rounded-full bg-surface-container-low flex items-center justify-center text-primary group-hover:bg-primary-container group-hover:text-on-primary-container transition-colors duration-200">
<span class="material-symbols-outlined" style="font-variation-settings: 'FILL' 0;">mail</span>
</div>
<div class="ml-4 flex-1">
<p class="font-headline-sm text-headline-sm text-text-main">이메일로 인증</p>
<p class="text-caption text-text-muted">수신함으로 매직 링크를 보내드립니다</p>
</div>
<span class="material-symbols-outlined text-outline-variant group-hover:text-primary transition-colors">chevron_right</span>
</button>
<!-- Option 2: Recovery Code -->
<button class="w-full group relative flex items-center p-5 bg-bg-primary rounded-xl border border-surface-border hover:border-primary/30 transition-all duration-200 text-left shadow-sm hover:shadow-md hover:-translate-y-0.5 active:translate-y-0">
<div class="w-12 h-12 rounded-full bg-surface-container-low flex items-center justify-center text-primary group-hover:bg-primary-container group-hover:text-on-primary-container transition-colors duration-200">
<span class="material-symbols-outlined" style="font-variation-settings: 'FILL' 0;">key</span>
</div>
<div class="ml-4 flex-1">
<p class="font-headline-sm text-headline-sm text-text-main">복구 코드로 인증</p>
<p class="text-caption text-text-muted">24자리 백업 키를 입력하세요</p>
</div>
<span class="material-symbols-outlined text-outline-variant group-hover:text-primary transition-colors">chevron_right</span>
</button>
<!-- Option 3: Support -->
<div class="pt-6 border-t border-surface-border mt-8">
<p class="text-center text-body-md text-text-muted mb-4">
                        두 방법 모두 사용할 수 없나요?
                    </p>
<button class="w-full py-4 text-primary font-headline-sm text-headline-sm bg-primary-fixed hover:bg-primary-fixed-dim rounded-xl transition-all duration-200 active:scale-95">
                        고객 센터 문의

<!-- Contextual Branding Image -->

<div class="absolute inset-0 bg-gradient-to-br from-primary/5 to-surface-dim"></div>

<div class="absolute inset-0 flex items-center justify-center">
<div class="text-center">
<p class="font-label-caps text-label-caps text-primary tracking-widest uppercase">검증된 보안</p>
<p class="text-caption text-text-muted mt-1">종단간 암호화된 복구 프로세스</p>
</div>
</div>
</div>
<!-- Footer Compliance -->
<p class="mt-12 text-center text-caption text-outline-variant">
                COM-008 • Sortmate Secure Auth v2.4
            </p>

</main>
<!-- Notification Toast -->
<div class="fixed bottom-8 left-1/2 -translate-x-1/2 translate-y-24 bg-inverse-surface text-inverse-on-surface px-6 py-3 rounded-xl shadow-2xl flex items-center space-x-3 transition-transform duration-500 ease-out z-[100]" id="toast">
<span class="material-symbols-outlined text-primary-fixed-dim">info</span>
<span class="text-body-md font-medium" id="toast-message">메시지 내용</span>
</div>
<!-- Micro-interactions Script -->
<script>
        const buttons = document.querySelectorAll('button');
        buttons.forEach(btn => {
            btn.addEventListener('click', () => {
                if (btn.innerText.includes('이메일')) {
                    showToast('이메일로 복구 링크를 보냈습니다.');
                } else if (btn.innerText.includes('고객 센터')) {
                    showToast('고객 지원 포털로 이동 중...');
                }
            });
        });

        function showToast(message) {
            const toast = document.getElementById('toast');
            const toastMsg = document.getElementById('toast-message');
            toastMsg.innerText = message;
            toast.classList.remove('translate-y-24');
            toast.classList.add('translate-y-0');
            
            setTimeout(() => {
                toast.classList.add('translate-y-24');
                toast.classList.remove('translate-y-0');
            }, 3000);
        }

        window.addEventListener('scroll', () => {
            const nav = document.querySelector('nav');
            if (window.scrollY > 20) {
                nav.classList.add('shadow-sm', 'bg-surface/95');
                nav.classList.remove('bg-surface/80');
            } else {
                nav.classList.remove('shadow-sm', 'bg-surface/95');
                nav.classList.add('bg-surface/80');
            }
        });
    </script>
