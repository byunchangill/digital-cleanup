<!DOCTYPE html>

<html class="light" lang="ko"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>비밀번호 재설정 - Sortmate</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Hanken+Grotesk:wght@400;500;600;700&amp;family=JetBrains+Mono:wght@500&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
        .glass-surface {
            background: rgba(255, 255, 255, 0.7);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
        }
    </style>
<script id="tailwind-config">
        tailwind.config = {
          darkMode: "class",
          theme: {
            extend: {
              "colors": {
                      "on-secondary-fixed-variant": "#005236",
                      "inverse-primary": "#c3c0ff",
                      "primary-container": "#4f46e5",
                      "on-primary-container": "#dad7ff",
                      "tertiary-fixed": "#ffddb8",
                      "tertiary-fixed-dim": "#ffb95f",
                      "surface-dim": "#cbdbf5",
                      "surface-container-lowest": "#ffffff",
                      "text-muted": "#64748B",
                      "inverse-surface": "#213145",
                      "surface-bright": "#f8f9ff",
                      "on-error": "#ffffff",
                      "error": "#ba1a1a",
                      "surface-container-low": "#eff4ff",
                      "on-secondary": "#ffffff",
                      "tertiary": "#684000",
                      "secondary-fixed": "#6ffbbe",
                      "on-error-container": "#93000a",
                      "on-primary": "#ffffff",
                      "on-surface": "#0b1c30",
                      "secondary-fixed-dim": "#4edea3",
                      "surface-tint": "#4d44e3",
                      "on-tertiary-container": "#ffd4a4",
                      "on-tertiary-fixed-variant": "#653e00",
                      "error-container": "#ffdad6",
                      "secondary": "#006c49",
                      "outline": "#777587",
                      "outline-variant": "#c7c4d8",
                      "on-tertiary-fixed": "#2a1700",
                      "surface-container": "#e5eeff",
                      "surface": "#f8f9ff",
                      "surface-border": "#E2E8F0",
                      "on-background": "#0b1c30",
                      "surface-variant": "#d3e4fe",
                      "secondary-container": "#6cf8bb",
                      "background": "#f8f9ff",
                      "primary-fixed": "#e2dfff",
                      "primary": "#3525cd",
                      "primary-fixed-dim": "#c3c0ff",
                      "inverse-on-surface": "#eaf1ff",
                      "vault-blur": "rgba(255, 255, 255, 0.4)",
                      "on-secondary-fixed": "#002113",
                      "on-surface-variant": "#464555",
                      "surface-container-high": "#dce9ff",
                      "on-primary-fixed": "#0f0069",
                      "bg-primary": "#FFFFFF",
                      "surface-container-highest": "#d3e4fe",
                      "bg-secondary": "#F8FAFC",
                      "text-main": "#0F172A",
                      "on-tertiary": "#ffffff",
                      "on-primary-fixed-variant": "#3323cc",
                      "on-secondary-container": "#00714d",
                      "tertiary-container": "#885500"
              },
              "borderRadius": {
                      "DEFAULT": "0.25rem",
                      "lg": "0.5rem",
                      "xl": "0.75rem",
                      "full": "9999px"
              },
              "spacing": {
                      "stack-gap-lg": "24px",
                      "stack-gap-sm": "8px",
                      "grid-gutter": "12px",
                      "base-unit": "4px",
                      "stack-gap-md": "16px",
                      "container-padding": "20px"
              },
              "fontFamily": {
                      "body-lg": ["Hanken Grotesk"],
                      "headline-sm": ["Hanken Grotesk"],
                      "headline-lg-mobile": ["Hanken Grotesk"],
                      "body-md": ["Hanken Grotesk"],
                      "display-lg": ["Hanken Grotesk"],
                      "headline-md": ["Hanken Grotesk"],
                      "caption": ["Hanken Grotesk"],
                      "label-caps": ["JetBrains Mono"]
              },
              "fontSize": {
                      "body-lg": ["16px", {"lineHeight": "24px", "fontWeight": "400"}],
                      "headline-sm": ["20px", {"lineHeight": "28px", "fontWeight": "600"}],
                      "headline-lg-mobile": ["28px", {"lineHeight": "36px", "fontWeight": "700"}],
                      "body-md": ["14px", {"lineHeight": "20px", "fontWeight": "400"}],
                      "display-lg": ["32px", {"lineHeight": "40px", "letterSpacing": "-0.02em", "fontWeight": "700"}],
                      "headline-md": ["24px", {"lineHeight": "32px", "letterSpacing": "-0.01em", "fontWeight": "600"}],
                      "caption": ["12px", {"lineHeight": "16px", "fontWeight": "400"}],
                      "label-caps": ["12px", {"lineHeight": "16px", "letterSpacing": "0.05em", "fontWeight": "500"}]
              }
            },
          },
        }
      </script>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
</head>
<body class="bg-background text-on-surface font-body-lg min-h-screen flex flex-col items-center justify-center relative overflow-hidden">
<!-- Background Decorative Elements -->
<div class="absolute inset-0 pointer-events-none overflow-hidden">
<div class="absolute -top-[10%] -right-[10%] w-[50%] h-[50%] rounded-full bg-primary-container/10 blur-[120px]"></div>
<div class="absolute -bottom-[10%] -left-[10%] w-[50%] h-[50%] rounded-full bg-secondary-container/10 blur-[120px]"></div>
</div>
<!-- Main Content Canvas -->
<main class="w-full max-w-[420px] px-container-padding z-10 animate-fade-in">
<!-- Header Section -->
<header class="mb-10 text-center">
<div class="mb-8 flex justify-center">
<div class="w-16 h-16 bg-primary-container rounded-2xl shadow-lg flex items-center justify-center">
<span class="material-symbols-outlined text-on-primary-container !text-[32px]">lock_reset</span>
</div>
</div>
<h1 class="font-headline-lg-mobile text-headline-lg-mobile text-on-surface mb-2">비밀번호 재설정</h1>
<p class="font-body-md text-body-md text-on-surface-variant max-w-[320px] mx-auto">
                이메일 주소를 입력하시면 비밀번호 재설정을 위한 링크를 보내드립니다.
            </p>
</header>
<!-- Form Section -->
<form class="space-y-stack-gap-lg" onsubmit="return false;">
<div class="space-y-stack-gap-sm">
<label class="font-label-caps text-label-caps text-on-surface-variant px-1" for="email">이메일 주소</label>
<div class="relative group">
<div class="absolute inset-y-0 left-4 flex items-center pointer-events-none text-on-surface-variant group-focus-within:text-primary transition-colors">
<span class="material-symbols-outlined !text-[20px]">mail</span>
</div>
<input class="w-full h-14 pl-12 pr-4 bg-surface-container-lowest border border-outline-variant rounded-xl focus:ring-2 focus:ring-primary/20 focus:border-primary outline-none transition-all font-body-md text-on-surface" id="email" placeholder="예: name@company.com" type="email"/>
</div>
</div>
<button class="w-full h-14 bg-primary text-on-primary font-headline-sm text-headline-sm rounded-xl shadow-[0_4px_12px_rgba(53,37,205,0.25)] hover:shadow-[0_6px_16px_rgba(53,37,205,0.35)] active:scale-[0.98] transition-all flex items-center justify-center gap-2" type="submit">
                재설정 링크 발송
                <span class="material-symbols-outlined !text-[20px]">arrow_forward</span>
</button>
</form>
<!-- Footer Actions -->
<footer class="mt-8 text-center">
<a class="inline-flex items-center gap-2 font-body-md text-body-md text-primary hover:text-on-primary-fixed-variant transition-colors group" href="login.html">
<span class="material-symbols-outlined !text-[18px] group-hover:-translate-x-1 transition-transform">arrow_back</span>
                로그인으로 돌아가기
            </a>
</footer>
</main>
<!-- Support Message / Micro-copy -->
<div class="fixed bottom-10 left-0 w-full text-center px-container-padding">
<p class="font-caption text-caption text-text-muted">
            도움이 필요하신가요? <a class="text-primary hover:underline underline-offset-4" href="#">고객 지원팀</a>에 문의하세요
</p>
</div>
<!-- Feedback Toast (Hidden by default) -->
<div class="fixed bottom-24 left-1/2 -translate-x-1/2 translate-y-20 opacity-0 bg-inverse-surface text-inverse-on-surface px-6 py-3 rounded-full font-body-md text-body-md shadow-lg transition-all duration-300 flex items-center gap-3" id="toast">
<span class="material-symbols-outlined text-secondary-fixed">check_circle</span>
        링크가 발송되었습니다! 편지함을 확인해 주세요.
    </div>
<script>
        // Simple micro-interaction for button press
        const form = document.querySelector('form');
        const toast = document.getElementById('toast');
        const submitBtn = form.querySelector('button');

        form.addEventListener('submit', (e) => {
            e.preventDefault();
            
            // Visual loading state
            submitBtn.disabled = true;
            submitBtn.innerHTML = '<span class="material-symbols-outlined animate-spin">progress_activity</span> 전송 중...';
            
            setTimeout(() => {
                // Success state
                toast.classList.remove('translate-y-20', 'opacity-0');
                submitBtn.innerHTML = '성공적으로 발송됨';
                submitBtn.classList.replace('bg-primary', 'bg-secondary');
                
                setTimeout(() => {
                    toast.classList.add('translate-y-20', 'opacity-0');
                }, 3000);
            }, 1500);
        });

        // Interactive background effect
        document.addEventListener('mousemove', (e) => {
            const x = e.clientX / window.innerWidth;
            const y = e.clientY / window.innerHeight;
            
            const bubbles = document.querySelectorAll('.rounded-full');
            if (bubbles.length >= 2) {
                bubbles[0].style.transform = `translate(${x * 20}px, ${y * 20}px)`;
                bubbles[1].style.transform = `translate(${-x * 30}px, ${-y * 30}px)`;
            }
        });
    </script>
</body></html>
